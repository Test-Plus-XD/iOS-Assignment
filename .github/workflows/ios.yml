name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "Pour Rice.xcodeproj"

      - name: Build and test
        shell: bash
        run: |
          set -euo pipefail

          PROJECT="Pour Rice.xcodeproj"
          SCHEME="Pour Rice"

          RUNTIME=$(xcrun simctl list runtimes | grep -E "iOS" | grep -v unavailable | tail -n 1 | awk -F '[()]' '{print $2}')
          DEVICE=$(xcrun simctl list devicetypes | grep -E "iPhone" | head -n 1 | awk -F '[()]' '{print $1}' | sed 's/[[:space:]]*$//')

          if [[ -z "$RUNTIME" || -z "$DEVICE" ]]; then
            echo "Unable to find an available iOS simulator runtime/device on runner"
            xcrun simctl list
            exit 1
          fi

          DESTINATION="platform=iOS Simulator,name=$DEVICE,OS=latest"
          echo "Using destination: $DESTINATION"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            clean test
